        // Sandbox Compatible Typewriter Engine
        function typeText(element, text, callback) {
            element.innerHTML = "";
            let i = 0;
            
            // Instantly render if text has HTML styling to avoid code parser bugs
            if (text.indexOf("<span") !== -1) {
                element.innerHTML = text;
                if (callback) callback();
                return;
            }

            function type() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, 20); // Typing speed
                } else if (callback) {
                    callback();
                }
            }
            type();
        }
